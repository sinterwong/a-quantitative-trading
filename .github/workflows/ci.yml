name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ---------------------------------------------------------------
  # Job 1: Linux - syntax check + flake8 + unit tests
  # ---------------------------------------------------------------
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests flask werkzeug pyyaml pyarrow
          pip install scipy lightgbm "xgboost<2.1" joblib reportlab matplotlib

      - name: Syntax check (全仓库 py_compile via git ls-files)
        run: |
          # P2-21: 替代散点检查为全量编译，避免遗漏新文件
          python - <<'PY'
          import subprocess, sys
          out = subprocess.check_output(['git', 'ls-files', '*.py']).decode().splitlines()
          fails = []
          for p in out:
              try:
                  subprocess.check_call([sys.executable, '-m', 'py_compile', p])
              except subprocess.CalledProcessError:
                  fails.append(p)
          if fails:
              print('FAILED to compile:')
              for f in fails: print('  ', f)
              sys.exit(1)
          print(f'compiled {len(out)} files')
          PY

      - name: Flake8 lint (core modules — errors only, E/W 级别)
        run: |
          # 只检查 core/ 新增模块，忽略行长(E501)和复杂度警告
          flake8 core/backtest_engine.py core/walkforward.py core/data_quality.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503,W504,E203 \
            --count

      - name: Run pytest (full suite)
        run: |
          # P2-21: 跑完整 pytest，替代 run_tests.py 的自定义框架（仍保留兼容）
          pytest tests/ -q --tb=short \
            --ignore=tests/test_backtest_engine.py \
            --ignore=tests/test_walkforward.py \
            --ignore=tests/test_data_quality.py
          # 上面三个用自定义 check() 框架，由 test-quality job 单独跑

      - name: Run unit tests (legacy run_tests.py)
        run: python tests/run_tests.py
        continue-on-error: true   # 已被 pytest 覆盖，仅做兼容性回归

  # ---------------------------------------------------------------
  # Job 2: Linux - pytest + mypy (重点模块类型检查)
  # ---------------------------------------------------------------
  test-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pandas numpy requests flask werkzeug pyyaml pyarrow
          pip install scipy lightgbm "xgboost<2.1" joblib reportlab matplotlib

      - name: Mypy type check (core 重点模块)
        run: |
          mypy core/data_quality.py \
            --ignore-missing-imports \
            --no-strict-optional \
            --allow-untyped-defs \
            --no-error-summary \
            || true   # mypy 错误不阻断 CI，仅展示结果

      - name: Run Phase 1 tests (custom check() framework, not pytest-compatible)
        # 这三个文件使用 check(cond, msg) 自定义框架，顶层直接运行测试代码，
        # 无 def test_*() 函数，pytest 收集 0 项会返回 exit code 5 导致 CI 失败。
        # 使用 python 直接执行；测试失败时文件末尾 sys.exit(1) 触发 CI 报错。
        run: |
          python tests/test_backtest_engine.py
          python tests/test_walkforward.py
          python tests/test_data_quality.py

      - name: Coverage report (XML for codecov + terminal)
        run: |
          pytest tests/ --cov=core --cov=scripts --cov=backend \
            --cov-report=term --cov-report=xml \
            --ignore=tests/test_backtest_engine.py \
            --ignore=tests/test_walkforward.py \
            --ignore=tests/test_data_quality.py \
            -q --tb=no || true   # 覆盖率不阻断 CI

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false   # codecov 不可达不阻断 CI
          verbose: false

  # ---------------------------------------------------------------
  # Job 3: Windows CI - single version (syntax + unit tests)
  # ---------------------------------------------------------------
  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.11']  # single version to save runner minutes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests flask werkzeug pyyaml pyarrow pytest

      - name: Syntax check (Windows)
        shell: bash
        run: |
          python -m py_compile core/backtest_engine.py
          python -m py_compile core/walkforward.py
          python -m py_compile core/data_quality.py
          python -m py_compile core/data_layer.py
          python -m py_compile scripts/dynamic_selector.py
          python -m py_compile scripts/stock_data_only.py
          python -m py_compile scripts/walkforward_job.py
          python -m py_compile scripts/quant/data_loader.py
          python -m py_compile scripts/quant/signal_generator.py
          python -m py_compile scripts/quant/news_quality.py
          python -m py_compile scripts/quant/monte_carlo.py
          python -m py_compile backend/services/signals.py
          python -m py_compile backend/services/intraday_monitor.py
          python -m py_compile backend/services/report_sender.py
          python -m py_compile strategies/__init__.py
          python -m py_compile streamlit_app.py

      - name: Run unit tests (Windows)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL: C.UTF-8
        run: python tests/run_tests.py
