# R3-1: pre-commit 工具链。本地 staged 文件在 git commit 时自动跑 ruff/
# mypy；新代码不通过 lint 就提交不了。
#
# 启用方式（每个开发者一次）：
#   pip install pre-commit
#   pre-commit install
#
# CI 里 ruff check / mypy 是最终 gate，不依赖开发者本地装。

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      # 不启用 ruff-format（R3-5 之前不强推格式重写）

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        # 只跑选定的 strict 模块；存量代码 R3-2 持续整改时再扩展
        files: ^core/(singleton|lifecycle|idempotency|errors|config_defaults|use_cases/.*)\.py$
        additional_dependencies: []
